<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>発言の小径（はつげんこみち）｜見えない体験の記録庫</title>
  <meta name="description" content="見えない体験の記録庫 · since 2026">
  <style>
    :root {
      --bg: #f8f5f0;
      --accent: #a8c0d6;
      --text: #2c3e50;
      --light-text: #5f6f7f;
      --card: #ffffff;
    }

    body {
      font-family: "Helvetica Neue", Helvetica, Arial, "Hiragino Sans", "Meiryo", sans-serif;
      line-height: 1.8;
      color: var(--text);
      background: var(--bg);
      margin: 0;
      padding: 40px 20px;
      max-width: 860px;
      margin: 0 auto;
    }

    h1 {
      font-size: 2.4rem;
      color: var(--text);
      text-align: center;
      margin-bottom: 8px;
      border-bottom: 3px solid var(--accent);
      padding-bottom: 12px;
    }

    .subtitle {
      text-align: center;
      font-size: 1.1rem;
      color: var(--light-text);
      margin-bottom: 30px;
    }

    .intro {
      text-align: center;
      margin: 30px 0;
      font-size: 1.05rem;
    }

    .intro p {
      margin: 8px 0;
    }

    .filters {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 40px 0 30px;
    }

    .filters button {
      padding: 10px 18px;
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: 50px;
      color: var(--text);
      cursor: pointer;
      font-size: 0.95rem;
      transition: all 0.3s ease;
    }

    .filters button:hover {
      background: var(--accent);
      color: white;
      transform: translateY(-2px);
    }

    .filters button.active {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 10px rgba(168, 192, 214, 0.4);
    }

    .post {
      background: var(--card);
      border-radius: 16px;
      padding: 28px;
      margin-bottom: 28px;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.06);
      border: 1px solid #eee;
    }

    .post h3 {
      margin: 0 0 16px;
      font-size: 1.35rem;
      color: var(--text);
      border-left: 5px solid var(--accent);
      padding-left: 14px;
    }

    .meta {
      font-size: 0.95rem;
      color: var(--light-text);
      margin-bottom: 18px;
    }

    .post p {
      margin: 14px 0;
      font-size: 1.05rem;
    }

    .label {
      font-weight: bold;
      color: #4a6b8a;
      display: inline-block;
      width: 110px;
    }

    .back-link {
      display: inline-block;
      margin-bottom: 30px;
      color: var(--accent);
      text-decoration: none;
      font-weight: bold;
    }

    .back-link:hover {
      text-decoration: underline;
    }

    footer {
      text-align: center;
      margin-top: 60px;
      color: var(--light-text);
      font-size: 0.9rem;
    }

    @media (max-width: 640px) {
      body { padding: 20px 15px; }
      h1 { font-size: 2rem; }
      .post { padding: 22px; }
    }
  </style>
</head>
<body>
  <a href="https://thth1255079.github.io/tokko/" class="back-link">← 岩戸ログへ戻る</a>

  <div class="subtitle">※名前変えました｜見えない体験の記録庫</div>

  <div class="intro">
    <p>見えない体験の記録庫 · since 2026</p>
    <p>立場を問わない　体験だけが残る　解釈はいらない</p>
  </div>

  <div class="filters">
    <button class="active" onclick="filterPosts('all')">すべて</button>
    <button onclick="filterPosts('手かざし')">手かざし</button>
    <button onclick="filterPosts('瞑想')">瞑想</button>
    <button onclick="filterPosts('整体')">整体</button>
    <button onclick="filterPosts('ヒーリング')">ヒーリング</button>
    <button onclick="filterPosts('チャネリング')">チャネリング</button>
    <button onclick="filterPosts('霊視')">霊視</button>
    <button onclick="filterPosts('その他')">その他</button>
  </div>

  <h2 style="text-align:center; margin:30px 0 20px;">ALL POSTS （12件）</h2>
